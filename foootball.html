<!DOCTYPE html>
<html>
<head>
    <title>Football Club Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid green;
            border-radius: 10px;
            background-color: #ffffff;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Football Club Registration Form</h2>

    <form>
        <input type="text" placeholder="Full Name"><br>
        <input type="number" placeholder="Age"><br>
        <input type="date" placeholder="Date of Birth"><br>
        <input type="text" placeholder="Gender"><br>
        <input type="text" placeholder="Address"><br>
        <input type="tel" placeholder="Phone Number"><br>
        <input type="email" placeholder="Email"><br>
        <input type="text" placeholder="Position"><br>
        <input type="text" placeholder="Jersey Number"><br>
        <input type="text" placeholder="Emergency Contact"><br>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
